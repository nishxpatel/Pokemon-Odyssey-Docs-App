<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Abilities — Pokémon Odyssey Pokédex</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="site-header">
  <span class="logo">Pokémon Odyssey</span>
  <span class="sub">Pokédex · v4.1.1</span>
  <nav>
    <a href="index.html">Home</a>
    <a href="pokedex.html">Pokédex</a>
    <a href="moves.html">Moves</a>
    <a href="abilities.html" class="active">Abilities</a>
    <a href="items.html">Items</a>
  </nav>
</header>

<main class="wrap">
  <h1>Abilities</h1>
  <p class="disclaimer" id="meta-line">Loading…</p>

  <div class="filters">
    <input id="search" class="search" placeholder="Search by name or effect…" type="search" autocomplete="off">
    <select id="kind-filter" class="select">
      <option value="">All sources</option>
      <option value="custom">Custom only (new + reworked)</option>
      <option value="new">New (Odyssey-original)</option>
      <option value="reworked">Reworked vanilla</option>
      <option value="baseline">Baseline (vanilla)</option>
    </select>
    <select id="sort" class="select">
      <option value="name">Sort: Name (A→Z)</option>
      <option value="users-desc">Sort: Most users</option>
    </select>
  </div>

  <table class="abilities-table">
    <thead>
      <tr>
        <th>Ability</th>
        <th>Effect</th>
        <th>Users</th>
      </tr>
    </thead>
    <tbody id="abilities-tbody"></tbody>
  </table>
  <p class="empty-msg" id="empty" style="display:none">No abilities match your filters.</p>
</main>

<script src="assets/abilities-list.js"></script>
</body>
</html>
